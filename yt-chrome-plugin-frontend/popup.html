<!DOCTYPE html>
<html>
<head>
<title>YouTube Comment Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #ff4444;
    --accent2: #ff8c42;
    --accent3: #4af0c4;
    --text: #f0f0f5;
    --text-muted: #7070a0;
    --text-dim: #404060;
    --red-glow: rgba(255,68,68,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 360px;
    min-height: 200px;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }
  .header-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 14px; height: 14px; fill: white; }
  .header-text h1 {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .header-text p {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .status-dot {
    margin-left: auto;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Output area */
  #output { padding: 14px 16px; }

  /* Loading state */
  .loading-line {
    height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .loading-line::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-200%); }
    100% { transform: translateX(400%); }
  }
  .loading-text {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    margin-bottom: 4px;
  }

  /* Video ID tag */
  .video-id-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
    margin-bottom: 12px;
  }
  .video-id-tag span { color: var(--text-muted); }

  /* Section */
  .section {
    margin-bottom: 14px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 10px;
  }
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Metrics grid */
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .metric-card:hover { border-color: rgba(255,255,255,0.15); }
  .metric-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0.5;
  }
  .metric-card:nth-child(1)::after { background: var(--accent); }
  .metric-card:nth-child(2)::after { background: var(--accent2); }
  .metric-card:nth-child(3)::after { background: var(--accent3); }
  .metric-card:nth-child(4)::after { background: #a78bfa; }
  .metric-title {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .metric-value {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .metric-unit {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: 2px;
  }

  /* Chart/image containers */
  .viz-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    min-height: 40px;
  }
  .viz-box img {
    width: 100%;
    display: block;
    margin: 0;
  }

  /* Comment list */
  .comment-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .comment-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text);
    position: relative;
    padding-left: 10px;
  }
  .comment-number {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .comment-text { color: #c0c0d8; }
  .sentiment-badge {
    display: inline-block;
    margin-top: 5px;
    padding: 2px 7px;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .sentiment-badge.pos { background: rgba(74,240,196,0.1); color: var(--accent3); border: 1px solid rgba(74,240,196,0.2); }
  .sentiment-badge.neg { background: rgba(255,68,68,0.1); color: var(--accent); border: 1px solid rgba(255,68,68,0.2); }
  .sentiment-badge.neu { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }

  /* Error / invalid state */
  .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    text-align: center;
    gap: 8px;
  }
  .error-icon {
    width: 36px; height: 36px;
    background: rgba(255,68,68,0.1);
    border: 1px solid rgba(255,68,68,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .error-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .error-sub { font-size: 11px; color: var(--text-muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  /* Fade-in animation for sections */
  .section { animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.15 8.15 0 004.77 1.52V6.76a4.85 4.85 0 01-1-.07z"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>YT Insights</h1>
    <p>Comment Intelligence</p>
  </div>
  <div class="status-dot"></div>
</div>

<div id="output"></div>

<script src="popup.js"></script>
</body>
</html>
